apiVersion: v1
kind: Namespace
metadata:
  name: rentalradar
---
apiVersion: v1
kind: Secret
metadata:
  name: rentalradar-browser-worker-secrets
  namespace: rentalradar
type: Opaque
stringData:
  DATABASE_URL: postgresql+psycopg://USER:PASSWORD@HOST:5432/rentalradar?sslmode=require
  REDIS_URL: redis://:PASSWORD@redis.example.internal:6379/0
  CELERY_BROKER_URL: redis://:PASSWORD@redis.example.internal:6379/1
  CELERY_RESULT_BACKEND: redis://:PASSWORD@redis.example.internal:6379/2
  TOKEN_ENCRYPTION_KEY: replace-with-fernet-key
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rentalradar-browser-worker-config
  namespace: rentalradar
data:
  ENVIRONMENT: production
  SCRAPER_HEADLESS: "false"
  SCRAPER_STEALTH: "true"
  SCRAPER_PROXY_REDIS_KEY: rentalradar:proxy_pool
  SCRAPER_PROXY_COOLDOWN_SECONDS: "120"
  BROWSER_WORKER_MAX_CONCURRENT_BROWSERS: "4"
  BROWSER_WORKER_METRICS_PORT: "9108"
  BROWSER_ACTION_LOG_DIR: /tmp/rentalradar/browser-actions
  SCRAPER_ALLOW_DETERMINISTIC_FALLBACK: "false"
  XVFB_WHD: 1920x1080x24
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rentalradar-browser-worker
  namespace: rentalradar
  labels:
    app: rentalradar-browser-worker
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: rentalradar-browser-worker
  template:
    metadata:
      labels:
        app: rentalradar-browser-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9108"
        prometheus.io/path: /metrics
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: browser-worker
          image: ghcr.io/YOUR_ORG/rentalradar-browser-worker:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: rentalradar-browser-worker-config
            - secretRef:
                name: rentalradar-browser-worker-secrets
          ports:
            - name: metrics
              containerPort: 9108
          resources:
            requests:
              cpu: "1500m"
              memory: "3Gi"
            limits:
              cpu: "3500m"
              memory: "6Gi"
          volumeMounts:
            - name: browser-actions
              mountPath: /tmp/rentalradar/browser-actions
            - name: shm
              mountPath: /dev/shm
          lifecycle:
            preStop:
              exec:
                command: ["/bin/bash", "-lc", "pkill -TERM -f 'celery|chrome' || true; sleep 20"]
          readinessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["/bin/bash", "-lc", "pgrep -f 'celery.*worker' >/dev/null"]
            initialDelaySeconds: 45
            periodSeconds: 20
            failureThreshold: 3
      volumes:
        - name: browser-actions
          emptyDir:
            sizeLimit: 5Gi
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: rentalradar-browser-worker-metrics
  namespace: rentalradar
  labels:
    app: rentalradar-browser-worker
spec:
  selector:
    app: rentalradar-browser-worker
  ports:
    - name: metrics
      port: 9108
      targetPort: metrics
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rentalradar-browser-worker
  namespace: rentalradar
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rentalradar-browser-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Percent
          value: 25
          periodSeconds: 120
