services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: rentalradar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./apps/api:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./apps/api:/app
    depends_on:
      - postgres
      - redis

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:8000
      NEXT_PUBLIC_ORGANIZATION_ID: 00000000-0000-0000-0000-000000000001
      NEXT_PUBLIC_USER_ID: 00000000-0000-0000-0000-000000000002
    volumes:
      - ./apps/web:/app
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:
