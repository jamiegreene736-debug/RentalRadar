global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: rentalradar-browser-workers
    static_configs:
      - targets:
          - browser-worker-1:9108
          - browser-worker-2:9108
        labels:
          service: browser-farm

  - job_name: rentalradar-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000
        labels:
          service: api
